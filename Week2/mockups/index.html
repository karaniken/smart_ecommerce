<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop - E-Commerce Mockup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        header { background: #2c3e50; color: white; padding: 1rem; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 2rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 250px; text-align: center; padding: 1rem; }
        .card img { width: 100%; border-radius: 8px; }
        button { background: #e67e22; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 1rem; margin-top: 2rem; }
        @media (max-width: 600px) { .card { width: 100%; } }
    </style>
</head>
<body>
    <header>
        <h1>SmartShop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Cart</a>
            <a href="#">Login</a>
        </nav>
    </header>
    <div class="products">
        <div class="card"><img src="https://via.placeholder.com/200" alt="Product"><h3>Product 1</h3><p>$49.99</p><button>Add to Cart</button></div>
        <div class="card"><img src="https://via.placeholder.com/200" alt="Product"><h3>Product 2</h3><p>$29.99</p><button>Add to Cart</button></div>
        <div class="card"><img src="https://via.placeholder.com/200" alt="Product"><h3>Product 3</h3><p>$19.99</p><button>Add to Cart</button></div>
    </div>
    <footer>&copy; 2026 SmartShop. All rights reserved.</footer>
</body>
</html>
